name: Update KVCA Notice

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 UTC 00:00 (KST 09:00) 자동 실행
  workflow_dispatch:        # 수동 실행 버튼도 제공

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run crawler
        run: python crawl_notice.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/notice.json
          git diff --cached --quiet || git commit -m "chore: update notice data $(date +'%Y-%m-%d')"
          git push
