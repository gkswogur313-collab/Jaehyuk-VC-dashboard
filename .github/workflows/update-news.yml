name: Update VC News

on:
  schedule:
    - cron: '0 * * * *'  # 매 시간 정각 실행
  workflow_dispatch:       # 수동 실행 버튼도 활성화

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 뉴스 수집 실행
        run: python crawl.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.html
          git diff --cached --quiet || git commit -m "chore: update news $(date +'%Y-%m-%d %H:%M')"
          git push
